# Backend configuration
backend = "glx";
vsync = true;
unredir-if-possible = true;
glx-no-stencil = true;

# Shadow configuration - sombras mais bonitas
shadow = true;
shadow-radius = 20;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-opacity = 1;
shadow-color = "#000000";

# Exclude shadows from certain windows
shadow-exclude = [
    "class_g = 'systray'",
    "class_g = 'dwm'",
    "class_g = 'dwmsystray'",
    "name = 'Notification'",
    "class_g ?= 'Notify-osd'",
    "name = 'Plank'",
    "name = 'Docky'",
    "name = 'Kupfer'",
    "name = 'xfce4-notifyd'",
    "class_g = 'Conky'",
    "class_g = 'Synapse'",
    "class_g ?= 'Xfce4-notifyd'",
    "class_g ?= 'Xfce4-power-manager'",
    "window_type = 'dock'",
    "window_type = 'desktop'",
];

# Fading configuration
fading = true;
fade-delta = 4;
fade-in-step = 0.03;
fade-out-step = 0.03;

# Opacity configuration
inactive-opacity = 0.96;
frame-opacity = 0.96;
inactive-opacity-override = false;

# Focus exclude
focus-exclude = [
  "class_g = 'YouTube'",
  "class_g = 'VirtualBox Machine'",
  "class_g = 'Virt-manager'",
  "class_g = 'Skype'",
];

# Rounded corners - bordas arredondadas
corner-radius = 20;
rounded-corners-exclude = [ 
    "window_type = 'dock'", 
    "window_type = 'desktop'",
    "class_g = 'i3bar'",
    "class_g = 'i3status'",
    "class_g = 'polybar'",
];

# Blur configuration
blur-kern = "3x3box";
blur-background-exclude = [
  "class_g = 'systray'",
  "class_g = 'dwmsystray'",
  "window_type = 'dock'",
  "window_type = 'desktop'",
];

# Detection settings
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
use-damage = true;
log-level = "warn";

# Window type settings
wintypes :
{
  tooltip : 
  {
    fade = true;
    shadow = true;
    opacity = 0.75;
    focus = true;
    full-shadow = false;
  };
  dock : 
  {
    shadow = false;
    clip-shadow-above = true;
  };
  dnd : 
  {
    shadow = false;
  };
  popup_menu : 
  {
    opacity = 0.8;
  };
  dropdown_menu : 
  {
    opacity = 0.8;
  };
};